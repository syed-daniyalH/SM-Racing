services:
  - type: web
    name: sm-racing-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: 'python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT'
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGIN_REGEX
        value: '^https://.*\.vercel\.app$'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
